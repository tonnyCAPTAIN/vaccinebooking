{% extends 'base.html' %}
{% load crispy_forms_tags %}
    
{% block title %} Reset password {% endblock %}

{% block content %} 

<div class="container">
<h3 class="text-center mt-4">Reset password</h3>

<div class="row">
<div class="col-md-4"></div>
<div class="col-md-4">
	<form method="POST">

	{% csrf_token %}

	{{ form|crispy }}

	<button class="btn btn-primary" type="submit" name="button">Reset password</button>
	{% comment %} <a class="btn btn-secondary" href="{% url 'login' %}">Cancel</a> {% endcomment %}
	
	</form>


</div>

</div>
</div>

{% endblock %
